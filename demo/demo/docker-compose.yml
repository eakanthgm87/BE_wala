version: "3.9"

services:
  myproject:
    image: myproject:latest
    container_name: myproject-container
    restart: unless-stopped
    ports:
      - "8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: myproject-network
